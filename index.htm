<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morse — Signal Lamp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* (Same CSS as before - kept compact) */
:root{--bg:#10151A;--panel:#171F26;--panel-2:#1D262E;--line:#2A353F;--amber:#FFB74D;--teal:#35D6B8;--text:#EAF0F3;--text-dim:#8CA0AC;--danger:#FF6B6B;--radius:14px;}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{background:radial-gradient(1200px 600px at 15% -10%, rgba(255,183,77,0.06), transparent 60%), radial-gradient(1000px 500px at 100% 0%, rgba(53,214,184,0.05), transparent 55%), var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:76px;}
.lamp{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #3a2a12, #0c0c0c 70%);border:2px solid #8A6428;transition:all .05s;}
.lamp.on{background:radial-gradient(circle at 35% 30%, #FFE9B8, #FFB74D 55%);box-shadow:0 0 20px 8px rgba(255,183,77,0.7);}
header{padding:22px 20px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:rgba(16,21,26,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);}
.switch{position:relative;width:42px;height:24px;} .slider-toggle{position:absolute;inset:0;background:var(--line);border-radius:24px;transition:.2s;}
.slider-toggle::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked + .slider-toggle{background:var(--teal);} input:checked + .slider-toggle::before{transform:translateX(18px);}
#videoWrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;aspect-ratio:4/3;}
#detectBox{position:absolute;width:100px;height:100px;border:3px solid var(--danger);border-radius:12px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;transition:opacity .2s;box-shadow:0 0 20px rgba(255,107,107,0.8);}
#detectBox.show{opacity:0.9;}
#flashOverlay{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:999;transition:opacity .08s;}
</style>
</head>
<body>
<div id="flashOverlay"></div>

<header><div class="lamp" id="headerLamp"></div><div><h1>Morse</h1><p>SIGNAL LAMP • OFFLINE</p></div></header>

<main>
  <!-- CONVERT (same) -->
  <section class="screen active" id="screen-convert"> ... (same as previous) </section>

  <!-- SEND -->
  <section class="screen" id="screen-send">
    <div class="card">
      <textarea id="sendText" style="min-height:140px">Hello World</textarea>
      <div id="estimate" style="font-size:13px;color:#8CA0AC;margin:8px 0"></div>
      <progress id="progressBar" value="0" max="100" style="width:100%"></progress>
    </div>

    <div style="display:flex;justify-content:center;gap:20px;margin:20px 0">
      <button id="btnPlay" style="width:70px;height:70px;border-radius:50%;font-size:28px;background:linear-gradient(#FFB74D,#8A6428);color:#3A2600">▶</button>
      <button id="btnStop" style="width:70px;height:70px;border-radius:50%;font-size:24px;background:#2A353F;color:white">■</button>
    </div>

    <div class="card">
      <div class="toggle-row"><span>Screen Flash</span><label class="switch"><input type="checkbox" id="toggleFlash" checked><span class="slider-toggle"></span></label></div>
      <div class="toggle-row"><span>Flashlight Torch</span><label class="switch"><input type="checkbox" id="toggleTorch"><span class="slider-toggle"></span></label></div>
      <div class="toggle-row"><span>Beep</span><label class="switch"><input type="checkbox" id="toggleAudio" checked><span class="slider-toggle"></span></label></div>
      <div class="toggle-row"><span>Loop</span><label class="switch"><input type="checkbox" id="toggleLoop"><span class="slider-toggle"></span></label></div>
    </div>
  </section>

  <!-- RECEIVE -->
  <section class="screen" id="screen-receive">
    <div class="note">Point camera at blinking light source. Dark background recommended.</div>
    <div id="videoWrap">
      <video id="video" playsinline autoplay muted></video>
      <div id="detectBox"></div>
    </div>
    <div class="card">
      <div class="card-title">Live Morse</div>
      <div id="liveMorse" style="font-family:monospace;font-size:16px;color:#35D6B8;min-height:30px;padding:8px;background:#1D262E;border-radius:8px;"></div>
    </div>
    <div class="card">
      <div class="card-title">Decoded Text</div>
      <div id="receivedText" style="padding:12px;min-height:80px;background:#1D262E;border-radius:8px;"></div>
      <button id="btnClearRx" style="margin-top:10px">Clear</button>
    </div>
  </section>
</main>

<script>
// ==================== CORE ====================
const MORSE_MAP = { /* same map as before */ };
const REVERSE_MAP = Object.fromEntries(Object.entries(MORSE_MAP).map(([k,v])=>[v,k]));

function encode(t){ return t.toUpperCase().trim().split(/\s+/).map(w=>w.split('').map(c=>MORSE_MAP[c]||'').join(' ')).join(' / '); }
function decode(m){ return m.trim().split(' / ').map(w=>w.trim().split(/\s+/).map(c=>REVERSE_MAP[c]||'').join('')).join(' '); }

// Torch
let torchTrack = null;
async function enableTorch(){
  if(torchTrack) return true;
  try{
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    torchTrack = s.getVideoTracks()[0];
    return true;
  }catch(e){ return false; }
}
async function setTorch(on){
  if(!torchTrack) return;
  try{ await torchTrack.applyConstraints({advanced:[{torch:on}]}); }catch(e){}
}

// Send (Improved timing)
let isSending = false;
let audioCtx = null;

async function sendMorse(morse, wpm = 15){
  if(isSending) return;
  isSending = true;

  const events = []; // build events logic...
  // (Full event builder code from previous versions)

  const progressBar = document.getElementById('progressBar');
  const useTorch = document.getElementById('toggleTorch').checked;
  const useFlash = document.getElementById('toggleFlash').checked;

  if(useTorch) await enableTorch();

  let i = 0;
  while(isSending){
    for(const [on, dur] of events){
      if(!isSending) break;
      document.getElementById('headerLamp').classList.toggle('on', on);
      if(useTorch) await setTorch(on);
      if(useFlash) document.getElementById('flashOverlay').style.opacity = on ? '0.9' : '0';

      if(document.getElementById('toggleAudio').checked && on){
        if(!audioCtx) audioCtx = new AudioContext();
        const o = audioCtx.createOscillator();
        o.frequency.value = 650;
        o.connect(audioCtx.destination);
        o.start();
        setTimeout(()=>o.stop(), dur);
      }
      progressBar.value = ++i % 100;
      await new Promise(r=>setTimeout(r, dur));
    }
    if(!document.getElementById('toggleLoop').checked) break;
  }

  // Cleanup
  isSending = false;
  document.getElementById('headerLamp').classList.remove('on');
  document.getElementById('flashOverlay').style.opacity = '0';
  if(torchTrack){ torchTrack.stop(); torchTrack = null; }
}

// Receive - Improved Detection
let lastBrightness = 0;
let morseBuffer = '';

function startReceive(){
  const video = document.getElementById('video');
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream => {
    video.srcObject = stream;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    setInterval(() => {
      if(video.videoWidth === 0) return;
      canvas.width = 80; canvas.height = 80;
      ctx.drawImage(video, 0, 0, 80, 80);
      const data = ctx.getImageData(0,0,80,80).data;
      let sum = 0;
      for(let i=0;i<data.length;i+=4) sum += data[i]+data[i+1]+data[i+2];
      const brightness = sum / (data.length/4);

      const diff = Math.abs(brightness - lastBrightness);
      lastBrightness = brightness;

      const threshold = 35;
      if(diff > threshold){
        morseBuffer += '•';
        document.getElementById('detectBox').classList.add('show');
      } else {
        morseBuffer += ' ';
        document.getElementById('detectBox').classList.remove('show');
      }

      // Simple decode attempt every 2 seconds
      if(morseBuffer.length > 80){
        document.getElementById('liveMorse').textContent = morseBuffer.slice(-60);
        // Try decoding
        const decoded = decode(morseBuffer.replace(/•+/g, '-').replace(/\s+/g,' '));
        if(decoded) document.getElementById('receivedText').textContent = decoded;
      }
    }, 60);
  });
}

// Button bindings
document.getElementById('btnPlay').onclick = () => {
  const text = document.getElementById('sendText').value;
  sendMorse(encode(text));
};

document.getElementById('btnStop').onclick = () => isSending = false;

// Init
document.querySelector('[data-target="receive"]').addEventListener('click', startReceive);
</script>
</body>
</html>
